services:
  mangasama:
    image: ghcr.io/icosisenpai/mangasama:latest
    container_name: mangasama
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Database, covers and default downloads.
      - mangasama-data:/data
      # Config, cookie cache and automatic backups.
      - mangasama-config:/config
      # Manga folders: add one bind mount per library, then pick the in-container
      # path (e.g. /libraries/manga) as the library root path during setup.
      - /volume1/manga:/libraries/manga:rw
      # - /volume1/manhwa:/libraries/manhwa:rw
      # - /volume1/raw:/libraries/raw:rw
    environment:
      - TZ=Europe/Rome
      # Bootstrap values — most configuration is now done in the web UI and saved
      # to /config/settings.yaml. Only change these if you need them before the
      # first boot.
      # - LOG_LEVEL=INFO
      # - DATA_DIR=/data
      # - CONFIG_DIR=/config
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).status == 200 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mangasama-data:
    name: mangasama-data
  mangasama-config:
    name: mangasama-config

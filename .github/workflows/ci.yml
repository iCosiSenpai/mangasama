name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check app tests
      - name: Type-check (advisory)
        run: mypy app
        continue-on-error: true
      - name: Tests
        run: pytest -q --cov=app --cov-report=term-missing

  frontend:
    name: Frontend (type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # package-lock.json is lockfileVersion 3 generated by npm 11; node 20
      # ships npm 10, whose `npm ci` reports it out of sync. Match the major.
      - name: Use npm 11
        run: npm install -g npm@11
      - name: Install
        run: npm ci
      - name: Type-check
        run: npm run type-check
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build

  security-audit:
    name: Security audit (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend + pip-audit
        run: pip install -e . pip-audit
      - name: pip-audit (advisory)
        run: pip-audit --strict || true
        continue-on-error: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm audit (advisory)
        working-directory: frontend
        run: npm audit --audit-level=high || true
        continue-on-error: true

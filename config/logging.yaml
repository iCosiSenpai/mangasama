# MangaSama — structlog config.
# Loaded by app/logging_config.py at startup.

version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S%z"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: default
    stream: ext://sys.stdout

loggers:
  app:
    level: INFO
    handlers: [console]
    propagate: no
  sqlalchemy.engine:
    level: WARNING
    handlers: [console]
    propagate: no
  apscheduler:
    level: INFO
    handlers: [console]
    propagate: no
  httpx:
    level: WARNING
    handlers: [console]
    propagate: no

root:
  level: INFO
  handlers: [console]
